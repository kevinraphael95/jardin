<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Jardin Japonais & Inventaire</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #game-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #87ceeb; }
        canvas { display: block; width: 100%; height: 100%; }

        /* UI Outils */
        .ui { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .btn { width: 60px; height: 60px; border-radius: 18px; border: 3px solid white; background: rgba(255,255,255,0.8); font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
        .btn.active { background: #ffd87a; border-color: #d4a017; transform: scale(1.1); }

        /* Inventaire */
        .inventory { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.2); border-radius: 15px; padding: 15px; color: white; min-width: 150px; backdrop-filter: blur(10px); z-index: 100; }
        .inv-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .inv-item { display: flex; justify-content: space-between; font-size: 13px; margin: 4px 0; }
        .inv-empty { font-style: italic; opacity: 0.6; font-size: 12px; }

        .hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 10px 25px; border-radius: 50px; font-size: 13px; z-index: 100; border: 1px solid rgba(255,255,255,0.1); }
        kbd { background: #333; padding: 2px 6px; border-radius: 4px; color: #ffda79; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="canvas"></canvas>
    
    <div class="ui">
        <div class="btn active" id="btn-plant" onclick="setTool('plant')">🌱</div>
        <div class="btn" id="btn-cut" onclick="setTool('cut')">✂️</div>
    </div>

    <div class="inventory" id="inventory">
        <div class="inv-title">📦 Inventaire</div>
        <div id="inv-list"><div class="inv-empty">Vide...</div></div>
    </div>

    <div class="hud">
        <kbd>Z Q S D</kbd> Marcher | <kbd>ESPACE</kbd> Sauter | <kbd>CLIC</kbd> Action
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let w, h, tool = 'plant';
    let flowers = [], blades = [], time = 0;
    let inventory = {};

    // --- CONFIG PERSONNAGE ---
    const player = {
        x: window.innerWidth/2, y: window.innerHeight/2,
        vx: 0, vy: 0,
        speed: 2.8, // Vitesse réduite comme demandé
        friction: 0.85,
        dir: 1,
        z: 0, // Hauteur du saut
        vz: 0,
        isJumping: false,
        gravity: 0.5
    };

    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'Space' && !player.isJumping) {
            player.vz = -8;
            player.isJumping = true;
        }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    // --- TYPES DE FLEURS (Variétés réelles) ---
    const FLOWER_TYPES = [
        { name: 'Coquelicot', main: '#e74c3c', center: '#2c3e50', petals: 4, size: 10, shape: 'round' },
        { name: 'Marguerite', main: '#ffffff', center: '#f1c40f', petals: 12, size: 8, shape: 'daisy' },
        { name: 'Bleuet', main: '#3498db', center: '#2980b9', petals: 8, size: 7, shape: 'star' },
        { name: 'Lavande', main: '#9b59b6', center: '#8e44ad', petals: 3, size: 4, shape: 'tall' },
        { name: 'Souci', main: '#f39c12', center: '#d35400', petals: 10, size: 9, shape: 'round' }
    ];

    function setTool(t) {
        tool = t;
        document.getElementById('btn-plant').classList.toggle('active', t === 'plant');
        document.getElementById('btn-cut').classList.toggle('active', t === 'cut');
    }

    const ROWS = 15; 
    const HORIZON = () => h * 0.4;
    const getY = (row) => HORIZON() + (row / ROWS) * (h - HORIZON());
    const getScale = (y) => 0.3 + 0.7 * ((y - HORIZON()) / (h - HORIZON()));

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        blades = [];
        // Génération d'une herbe plus "organique" et moins alignée
        for (let i = 0; i < 600; i++) {
            const ry = HORIZON() + Math.random() * (h - HORIZON());
            const sc = getScale(ry);
            blades.push({
                x: Math.random() * w,
                y: ry,
                sc: sc,
                h: (20 + Math.random() * 30) * sc,
                w: (1 + Math.random() * 2) * sc,
                off: Math.random() * 100,
                c: `hsl(${80 + Math.random() * 40}, ${30 + (ry/h)*20}%, ${20 + (ry/h)*15}%)`
            });
        }
        blades.sort((a,b) => a.y - b.y);
    }

    function createFlower(x, y) {
        const type = FLOWER_TYPES[Math.floor(Math.random() * FLOWER_TYPES.length)];
        const sc = getScale(y);
        flowers.push({
            x, y, sc, type,
            h: 0, maxH: (40 + Math.random() * 30) * sc,
            seed: Math.random() * 100,
            growSpeed: 1 + Math.random()
        });
        flowers.sort((a,b) => a.y - b.y);
    }

    function addToInventory(name) {
        inventory[name] = (inventory[name] || 0) + 1;
        updateInventoryUI();
    }

    function updateInventoryUI() {
        const list = document.getElementById('inv-list');
        const items = Object.entries(inventory);
        if (items.length === 0) {
            list.innerHTML = '<div class="inv-empty">Vide...</div>';
            return;
        }
        list.innerHTML = items.map(([name, count]) => `
            <div class="inv-item"><span>${name}</span> <b>x${count}</b></div>
        `).join('');
    }

    function drawFlower(f) {
        if (f.h < f.maxH) f.h += f.growSpeed;
        const sway = Math.sin(time + f.seed) * 10 * f.sc;
        const tx = f.x + sway;
        const ty = f.y - f.h;

        // Tige
        ctx.strokeStyle = '#27ae60';
        ctx.lineWidth = 3 * f.sc;
        ctx.beginPath();
        ctx.moveTo(f.x, f.y);
        ctx.quadraticCurveTo(f.x + sway*0.5, f.y - f.h*0.5, tx, ty);
        ctx.stroke();

        // Tête
        ctx.save();
        ctx.translate(tx, ty);
        ctx.rotate(time * 0.2 + f.seed);
        ctx.fillStyle = f.type.main;
        
        if (f.type.shape === 'tall') { // Style Lavande
            for(let i=0; i<6; i++) {
                ctx.beginPath(); ctx.ellipse(0, -i*5*f.sc, f.type.size, f.type.size*1.5, 0, 0, Math.PI*2); ctx.fill();
            }
        } else {
            for (let i = 0; i < f.type.petals; i++) {
                ctx.rotate((Math.PI * 2) / f.type.petals);
                ctx.beginPath();
                if(f.type.shape === 'star') ctx.rect(f.type.size, -2, f.type.size, 4);
                else ctx.ellipse(f.type.size, 0, f.type.size, f.type.size*0.6, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = f.type.center;
            ctx.beginPath(); ctx.arc(0, 0, f.type.size * 0.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    }

    function update() {
        time += 0.02;
        // Déplacement
        let moving = false;
        if (keys['KeyW'] || keys['ArrowUp']) { player.vy -= player.speed; moving = true; }
        if (keys['KeyS'] || keys['ArrowDown']) { player.vy += player.speed; moving = true; }
        if (keys['KeyA'] || keys['ArrowLeft']) { player.vx -= player.speed; player.dir = -1; moving = true; }
        if (keys['KeyD'] || keys['ArrowRight']) { player.vx += player.speed; player.dir = 1; moving = true; }

        player.vx *= player.friction; player.vy *= player.friction;
        player.x += player.vx; player.y += player.vy;

        // Saut
        if (player.isJumping) {
            player.vz += player.gravity;
            player.z += player.vz;
            if (player.z > 0) {
                player.z = 0;
                player.vz = 0;
                player.isJumping = false;
            }
        }

        // Limites
        player.x = Math.max(20, Math.min(w-20, player.x));
        player.y = Math.max(HORIZON()+10, Math.min(h-20, player.y));
    }

    function draw() {
        ctx.clearRect(0,0,w,h);

        // Ciel dégradé type image
        const sky = ctx.createLinearGradient(0,0,0,HORIZON());
        sky.addColorStop(0, '#5ea3db'); sky.addColorStop(1, '#a1d9f3');
        ctx.fillStyle = sky; ctx.fillRect(0,0,w,HORIZON());

        // Rendu herbe + fleurs + perso (triés par Y pour la profondeur)
        const allEntities = [
            ...blades.map(b => ({...b, type:'blade'})),
            ...flowers.map(f => ({...f, type:'flower'})),
            { x: player.x, y: player.y, type:'player' }
        ].sort((a,b) => a.y - b.y);

        allEntities.forEach(e => {
            if (e.type === 'blade') {
                const sway = Math.sin(time + e.off) * 5 * e.sc;
                ctx.strokeStyle = e.c;
                ctx.lineWidth = e.w;
                ctx.beginPath();
                ctx.moveTo(e.x, e.y);
                ctx.quadraticCurveTo(e.x, e.y - e.h*0.5, e.x + sway, e.y - e.h);
                ctx.stroke();
            } else if (e.type === 'flower') {
                drawFlower(e);
            } else if (e.type === 'player') {
                const sc = getScale(player.y);
                ctx.save();
                ctx.translate(player.x, player.y + player.z); // Z est négatif quand on saute
                ctx.scale(player.dir * sc, sc);
                
                // Ombre
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.beginPath(); ctx.ellipse(0, -player.z/sc, 20, 8, 0, 0, Math.PI*2); ctx.fill();

                // Corps Chibi
                ctx.fillStyle = '#3498db'; ctx.beginPath(); ctx.roundRect(-15, -35, 30, 30, 8); ctx.fill();
                ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.roundRect(-18, -65, 36, 35, 12); ctx.fill();
                ctx.fillStyle = '#2c3e50'; // Yeux
                ctx.beginPath(); ctx.arc(7,-50,2.5,0,Math.PI*2); ctx.arc(-7,-50,2.5,0,Math.PI*2); ctx.fill();
                ctx.restore();
            }
        });

        requestAnimationFrame(() => { update(); draw(); });
    }

    canvas.addEventListener('mousedown', e => {
        if (e.clientY < HORIZON()) return;
        if (tool === 'plant') {
            createFlower(e.clientX, e.clientY);
        } else {
            // Couper et ajouter à l'inventaire
            flowers = flowers.filter(f => {
                const d = Math.hypot(f.x - e.clientX, (f.y - f.h) - e.clientY);
                if (d < 40) {
                    addToInventory(f.type.name);
                    return false;
                }
                return true;
            });
        }
    });

    window.addEventListener('resize', init);
    init(); draw();
</script>
</body>
</html>
