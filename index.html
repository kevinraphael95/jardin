<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>
<div class="hint" id="hint">Toucher/Clic pour planter · ZQSD pour se déplacer</div>
<div class="ui">
  <div class="btn active" id="b-plant" onclick="setTool('plant')">🌱 Planter</div>
  <div class="btn" id="b-cut" onclick="setTool('cut')">✂️ Couper</div>
</div>
<div class="dpad">
  <div class="dpad-row"><div class="dpad-btn" id="dp-up">▲</div></div>
  <div class="dpad-row">
    <div class="dpad-btn" id="dp-left">◀</div>
    <div style="width:44px"></div>
    <div class="dpad-btn" id="dp-right">▶</div>
  </div>
  <div class="dpad-row"><div class="dpad-btn" id="dp-down">▼</div></div>
</div>
<script src="game.js"></script>
</body>
</html>
