<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jardin Ghibli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1b2a;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'Georgia',serif}
#game-container{width:100vw;height:100vh;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
.ui{position:absolute;top:24px;left:24px;display:flex;flex-direction:column;gap:12px;z-index:100}
.btn{width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.15);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.btn:hover{transform:scale(1.12);background:rgba(255,255,255,0.28)}
.btn.active{background:rgba(255,220,100,0.35);border-color:rgba(255,210,80,0.9);box-shadow:0 0 18px rgba(255,200,60,0.5)}
.hud{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.45);color:rgba(255,255,255,0.85);padding:9px 22px;border-radius:50px;font-size:12px;pointer-events:none;backdrop-filter:blur(10px);z-index:100;letter-spacing:.06em;border:1px solid rgba(255,255,255,0.1)}
kbd{background:rgba(255,255,255,0.15);padding:2px 7px;border-radius:4px;font-family:monospace;color:#ffd87a;margin:0 2px}
#season-btn{position:absolute;top:24px;right:24px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.4);border-radius:50px;color:rgba(255,255,255,0.9);padding:8px 16px;font-size:12px;cursor:pointer;backdrop-filter:blur(8px);letter-spacing:.08em;transition:all .2s;z-index:100}
#season-btn:hover{background:rgba(255,255,255,0.25)}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="canvas"></canvas>
  <div class="ui">
    <div class="btn active" id="btn-plant" title="Planter" onclick="setTool('plant')">🌱</div>
    <div class="btn" id="btn-cut" title="Couper" onclick="setTool('cut')">✂️</div>
    <div class="btn" id="btn-water" title="Arroser" onclick="setTool('water')">💧</div>
  </div>
  <button id="season-btn" onclick="nextSeason()">PRINTEMPS ▸</button>
  <div class="hud"><kbd>ZQSD</kbd> Déplacer &nbsp;|&nbsp; <kbd>Clic</kbd> Action</div>
</div>
<script>
const container = document.getElementById('game-container');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w, h, time = 0, wind = 0;
let tool = 'plant';
let flowers = [], particles = [], waterDrops = [], clouds = [], birds = [], fireflies = [];
let snowflakes = [];
let seasonIdx = 0;
const SEASONS = ['printemps','été','automne','hiver'];

const SEASON_CFG = {
  printemps: {
    skyTop:'#4a90d9', skyMid:'#89c4e1', skyBot:'#c8eac0',
    groundRows:[
      'hsl(115,38%,14%)','hsl(115,36%,17%)','hsl(112,34%,20%)',
      'hsl(110,32%,23%)','hsl(108,30%,26%)','hsl(106,28%,29%)',
      'hsl(104,26%,32%)','hsl(102,25%,35%)','hsl(100,24%,38%)',
      'hsl(98,23%,40%)','hsl(96,22%,42%)','hsl(94,21%,44%)',
      'hsl(92,20%,46%)','hsl(90,19%,48%)'
    ],
    fogColor:'rgba(200,240,210,',
    sunColor:'#fffde0', sunGlow:'rgba(255,245,180,0.4)',
    treeTrunk:'#5a3a1a', treeLeaf:'#4a9a3a',
    flowerPalettes:[
      {main:'#ff6b9d',center:'#fff176',stem:'#2ecc71',leaf:'#27ae60'},
      {main:'#ff9ff3',center:'#feca57',stem:'#27ae60',leaf:'#229954'},
      {main:'#74b9ff',center:'#fdcb6e',stem:'#00b894',leaf:'#1e8449'},
      {main:'#ffeaa7',center:'#e17055',stem:'#00cec9',leaf:'#00b894'},
      {main:'#fd79a8',center:'#ffeaa7',stem:'#6c5ce7',leaf:'#00b894'},
      {main:'#a29bfe',center:'#fd79a8',stem:'#55efc4',leaf:'#00cec9'},
    ]
  },
  été: {
    skyTop:'#1a5fa8', skyMid:'#4a9fd4', skyBot:'#8ed1e8',
    groundRows:[
      'hsl(110,36%,12%)','hsl(110,34%,15%)','hsl(108,32%,18%)',
      'hsl(106,30%,21%)','hsl(104,28%,24%)','hsl(102,26%,27%)',
      'hsl(100,25%,30%)','hsl(98,24%,33%)','hsl(96,23%,36%)',
      'hsl(94,22%,39%)','hsl(92,21%,42%)','hsl(90,20%,44%)',
      'hsl(88,19%,46%)','hsl(86,18%,48%)'
    ],
    fogColor:'rgba(180,220,255,',
    sunColor:'#fff9a0', sunGlow:'rgba(255,240,100,0.5)',
    treeTrunk:'#4a2e10', treeLeaf:'#2d7a25',
    flowerPalettes:[
      {main:'#fdcb6e',center:'#e17055',stem:'#00b894',leaf:'#006647'},
      {main:'#e17055',center:'#ffeaa7',stem:'#00cec9',leaf:'#005f3f'},
      {main:'#ff7675',center:'#fff',stem:'#26de81',leaf:'#20bf6b'},
      {main:'#ffeaa7',center:'#fdcb6e',stem:'#2ecc71',leaf:'#27ae60'},
      {main:'#fd79a8',center:'#fff',stem:'#0be881',leaf:'#05c46b'},
    ]
  },
  automne: {
    skyTop:'#5a2e08', skyMid:'#c47820', skyBot:'#e8b56a',
    groundRows:[
      'hsl(30,30%,12%)','hsl(30,28%,15%)','hsl(28,26%,18%)',
      'hsl(28,25%,21%)','hsl(26,24%,24%)','hsl(26,23%,27%)',
      'hsl(24,22%,30%)','hsl(24,21%,33%)','hsl(22,20%,36%)',
      'hsl(22,19%,38%)','hsl(20,18%,40%)','hsl(20,17%,42%)',
      'hsl(18,16%,44%)','hsl(18,15%,46%)'
    ],
    fogColor:'rgba(220,160,80,',
    sunColor:'#ffcc80', sunGlow:'rgba(255,160,60,0.4)',
    treeTrunk:'#3e2008', treeLeaf:'#c0580a',
    flowerPalettes:[
      {main:'#e17055',center:'#fdcb6e',stem:'#a0522d',leaf:'#8b4513'},
      {main:'#fd79a8',center:'#fff',stem:'#cd853f',leaf:'#8b6914'},
      {main:'#fdcb6e',center:'#e17055',stem:'#b8860b',leaf:'#8b6914'},
      {main:'#d63031',center:'#ffeaa7',stem:'#a0522d',leaf:'#8b4513'},
    ]
  },
  hiver: {
    skyTop:'#0a1a3a', skyMid:'#2a4a7a', skyBot:'#8ab4d4',
    groundRows:[
      'hsl(210,20%,55%)','hsl(210,18%,58%)','hsl(210,16%,61%)',
      'hsl(210,15%,63%)','hsl(210,14%,65%)','hsl(210,13%,67%)',
      'hsl(210,12%,69%)','hsl(210,11%,71%)','hsl(210,10%,73%)',
      'hsl(210,9%,75%)','hsl(210,8%,77%)','hsl(210,7%,79%)',
      'hsl(210,6%,81%)','hsl(210,5%,83%)'
    ],
    fogColor:'rgba(200,220,255,',
    sunColor:'#e0f0ff', sunGlow:'rgba(180,210,255,0.3)',
    treeTrunk:'#3a3a4a', treeLeaf:'#405070',
    flowerPalettes:[
      {main:'#dfe6e9',center:'#b2bec3',stem:'#636e72',leaf:'#2d3436'},
      {main:'#a29bfe',center:'#dfe6e9',stem:'#6c5ce7',leaf:'#4a4a6a'},
      {main:'#74b9ff',center:'#fff',stem:'#0984e3',leaf:'#2d6eaa'},
    ]
  }
};

const player = {
  x:0,y:0,vx:0,vy:0,speed:4.5,friction:0.80,
  dir:1,isMoving:false,frame:0,frameTimer:0,
  trail:[]
};
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => keys[e.code] = false);

function setTool(t) {
  tool = t;
  ['plant','cut','water'].forEach(x => document.getElementById('btn-'+x).classList.toggle('active', x===t));
  container.style.cursor = t === 'cut' ? 'none' : 'crosshair';
}
function nextSeason() {
  seasonIdx = (seasonIdx+1)%4;
  const s = SEASONS[seasonIdx];
  document.getElementById('season-btn').textContent = s.toUpperCase()+' ▸';
  buildGrass(); buildTrees();
  spawnSeasonParticles();
  if(seasonIdx===3) initSnow(); else snowflakes=[];
}

const ROWS = 14;
const HORIZON_RATIO = 0.40;
const getHorizon = () => h * HORIZON_RATIO;
const getY = r => getHorizon() + (r / ROWS) * (h - getHorizon());
const getScale = y => 0.18 + 0.82 * ((y - getHorizon()) / (h - getHorizon()));
const getRow = y => Math.floor(((y - getHorizon()) / (h - getHorizon())) * ROWS);

let blades = [], trees = [];

function init() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  player.x = w/2; player.y = h*0.72;
  buildGrass(); buildTrees(); buildClouds(); buildBirds(); buildFireflies();
}

// Sol avec brins d'herbe ultra détaillés style anime
function buildGrass() {
  blades = [];
  for (let r=0; r<ROWS; r++) {
    const rowY = getY(r);
    const sc = getScale(rowY);
    // Plus dense au premier plan
    const density = 0.4 + sc * 1.8;
    const n = Math.floor((w / 1.8) * density);
    for (let i=0; i<n; i++) {
      // Variation de teinte par rangée et saison
      const baseHue = seasonIdx===2 ? 28+r*1.5 : seasonIdx===3 ? 210 : 108+r*1.2;
      const sat = seasonIdx===3 ? 8+r : 28+r*2;
      const lig = seasonIdx===3 ? 55+r*2 : 14+r*2.5;
      const hueVar = (Math.random()-0.5)*12;
      // Plusieurs types de brins
      const type = Math.random();
      blades.push({
        x: Math.random()*w,
        row: r,
        y: rowY + (Math.random()*16-8),
        sc,
        h: type>0.7 ? (35+Math.random()*50)*sc : (15+Math.random()*25)*sc,
        w: type>0.7 ? (1.8+Math.random()*2.5)*sc : (0.8+Math.random()*1.5)*sc,
        offset: Math.random()*Math.PI*2,
        color: `hsl(${baseHue+hueVar},${sat}%,${lig}%)`,
        colorTip: `hsl(${baseHue+hueVar+8},${sat-5}%,${lig+15}%)`,
        type: type>0.85?'wide':type>0.6?'tall':'short',
        curve: (Math.random()-0.5)*0.6,
      });
    }
  }
}

function buildTrees() {
  trees = [];
  const cfg = SEASON_CFG[SEASONS[seasonIdx]];
  const count = 7 + Math.floor(Math.random()*5);
  for (let i=0; i<count; i++) {
    const row = Math.floor(Math.random()*5);
    const rowY = getY(row);
    const sc = getScale(rowY)*1.5;
    trees.push({
      x:Math.random()*w, y:rowY, row, sc,
      trunkH:(55+Math.random()*45)*sc,
      crownR:(40+Math.random()*40)*sc,
      trunk:cfg.treeTrunk, leaf:cfg.treeLeaf,
      sway:Math.random()*Math.PI*2,
      variant:Math.random()>0.45?'round':'conical'
    });
  }
  trees.sort((a,b)=>a.y-b.y);
}

function buildClouds() {
  clouds = [];
  for (let i=0; i<9; i++) {
    clouds.push({
      x:Math.random()*w, y:h*(0.03+Math.random()*0.32),
      r:35+Math.random()*70, speed:0.08+Math.random()*0.18,
      alpha:0.5+Math.random()*0.4,
      type:Math.random()>0.5?'cumulus':'stratus'
    });
  }
}

function buildBirds() {
  birds = [];
  for (let i=0; i<6; i++) {
    birds.push({
      x:Math.random()*w, y:h*(0.04+Math.random()*0.28),
      vx:0.5+Math.random()*0.9, vy:0,
      wing:0, wingDir:1, scale:0.5+Math.random()*0.6
    });
  }
}

function buildFireflies() {
  fireflies = [];
  for (let i=0; i<40; i++) {
    fireflies.push({
      x:Math.random()*w, y:h*(0.45+Math.random()*0.5),
      ox:Math.random()*w, oy:h*(0.45+Math.random()*0.5),
      r:1+Math.random()*1.8,
      phase:Math.random()*Math.PI*2,
      speed:0.25+Math.random()*0.55
    });
  }
}

function initSnow() {
  snowflakes = [];
  for(let i=0;i<140;i++) snowflakes.push({
    x:Math.random()*w, y:Math.random()*h,
    r:0.8+Math.random()*2.8, vx:(Math.random()-0.5)*0.4,
    vy:0.25+Math.random()*0.55, alpha:0.4+Math.random()*0.55,
    phase:Math.random()*Math.PI*2
  });
}

function spawnSeasonParticles() {
  for (let i=0; i<80; i++) {
    particles.push({
      x:Math.random()*w, y:Math.random()*h*0.55,
      vx:(Math.random()-0.5)*2.2, vy:0.3+Math.random()*1.4,
      alpha:1, size:3+Math.random()*7,
      color: seasonIdx===3 ? '#e8f4fd' :
             seasonIdx===2 ? `hsl(${15+Math.random()*45},82%,52%)` :
             `hsl(${70+Math.random()*130},72%,58%)`,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.12, life:1
    });
  }
}

// ─── CIEL anime avec couches ───
function drawSky(cfg) {
  // Gradient de fond 3 couches
  const sky = ctx.createLinearGradient(0,0,0,getHorizon()*1.15);
  sky.addColorStop(0, cfg.skyTop);
  sky.addColorStop(0.55, cfg.skyMid);
  sky.addColorStop(1, cfg.skyBot);
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,w,h*0.55);

  // Couche atmosphérique près de l'horizon
  const haze = ctx.createLinearGradient(0, getHorizon()*0.7, 0, getHorizon()*1.1);
  haze.addColorStop(0,'rgba(255,255,255,0)');
  haze.addColorStop(1,'rgba(255,255,255,0.18)');
  ctx.fillStyle = haze;
  ctx.fillRect(0, getHorizon()*0.7, w, getHorizon()*0.4);

  // Soleil avec halo et rayons
  drawSun(cfg);
}

function drawSun(cfg) {
  const sx = w*0.80, sy = h*0.09;
  // Halo externe doux
  const halo = ctx.createRadialGradient(sx,sy,0,sx,sy,h*0.28);
  halo.addColorStop(0,cfg.sunGlow);
  halo.addColorStop(0.4,'rgba(255,240,180,0.08)');
  halo.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(sx,sy,h*0.28,0,Math.PI*2); ctx.fill();

  // Disque solaire
  const sg = ctx.createRadialGradient(sx,sy,0,sx,sy,38);
  sg.addColorStop(0,'#ffffff');
  sg.addColorStop(0.4,cfg.sunColor);
  sg.addColorStop(1,cfg.sunGlow.replace('0.4','0.6').replace('0.3','0.5'));
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,38,0,Math.PI*2); ctx.fill();
}

function drawCloud(c) {
  ctx.save();
  ctx.globalAlpha = c.alpha;
  if(c.type==='cumulus') {
    // Nuage style anime — formes rondes empilées avec ombre douce
    const shadow = ctx.createLinearGradient(c.x,c.y-c.r,c.x,c.y+c.r*0.5);
    shadow.addColorStop(0,'rgba(255,255,255,0.95)');
    shadow.addColorStop(0.6,'rgba(240,248,255,0.9)');
    shadow.addColorStop(1,'rgba(200,220,245,0.7)');
    ctx.fillStyle = shadow;
    const puffs = [
      {dx:0,dy:0,r:c.r},
      {dx:c.r*0.65,dy:c.r*0.2,r:c.r*0.72},
      {dx:-c.r*0.6,dy:c.r*0.25,r:c.r*0.65},
      {dx:c.r*0.3,dy:-c.r*0.28,r:c.r*0.58},
      {dx:-c.r*0.25,dy:-c.r*0.2,r:c.r*0.5},
    ];
    puffs.forEach(p=>{
      ctx.beginPath(); ctx.arc(c.x+p.dx,c.y+p.dy,p.r,0,Math.PI*2); ctx.fill();
    });
    // Ombre sous le nuage
    ctx.globalAlpha=c.alpha*0.15;
    ctx.fillStyle='#6a8fa8';
    ctx.beginPath(); ctx.ellipse(c.x,c.y+c.r*0.55,c.r*0.9,c.r*0.18,0,0,Math.PI*2); ctx.fill();
  } else {
    // Nuage stratus — bande horizontale
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.ellipse(c.x,c.y,c.r*2.2,c.r*0.35,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawTree(t, cfg) {
  const sway = Math.sin(time*0.65+t.sway)*0.035*t.sc;
  ctx.save(); ctx.translate(t.x, t.y);
  // Ombre au sol
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.beginPath(); ctx.ellipse(0,4,t.crownR*0.65,t.crownR*0.16,0,0,Math.PI*2); ctx.fill();
  // Tronc avec grain
  const tg = ctx.createLinearGradient(-6*t.sc,0,6*t.sc,0);
  tg.addColorStop(0,'rgba(0,0,0,0.25)');
  tg.addColorStop(0.3,cfg.treeTrunk);
  tg.addColorStop(0.8,cfg.treeTrunk);
  tg.addColorStop(1,'rgba(0,0,0,0.2)');
  ctx.fillStyle=tg;
  ctx.beginPath(); ctx.roundRect(-5*t.sc,0,10*t.sc,-t.trunkH,[2,2,0,0]); ctx.fill();
  ctx.rotate(sway);
  if(t.variant==='conical') {
    [[1.0,1.0],[0.78,0.62],[0.56,0.3]].forEach(([rs,ys])=>{
      const g=ctx.createLinearGradient(-t.crownR*rs,0,t.crownR*rs,0);
      g.addColorStop(0,shadeColor(cfg.treeLeaf,-20));
      g.addColorStop(0.5,shadeColor(cfg.treeLeaf,15));
      g.addColorStop(1,shadeColor(cfg.treeLeaf,-20));
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.moveTo(-t.crownR*rs,-t.trunkH*(ys-0.32));
      ctx.lineTo(0,-t.trunkH*(ys+0.32));
      ctx.lineTo(t.crownR*rs,-t.trunkH*(ys-0.32));
      ctx.closePath(); ctx.fill();
    });
  } else {
    [[-t.crownR*0.28,-t.trunkH-t.crownR*0.22,t.crownR*0.72],
     [t.crownR*0.22,-t.trunkH-t.crownR*0.12,t.crownR*0.68],
     [0,-t.trunkH,t.crownR]].forEach(([ox,oy,r])=>{
      const g=ctx.createRadialGradient(ox,oy-r*0.2,0,ox,oy,r);
      g.addColorStop(0,shadeColor(cfg.treeLeaf,30));
      g.addColorStop(0.6,cfg.treeLeaf);
      g.addColorStop(1,shadeColor(cfg.treeLeaf,-25));
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ox,oy,r,0,Math.PI*2); ctx.fill();
    });
  }
  if(seasonIdx===2 && Math.random()<0.003) {
    particles.push({
      x:t.x+(Math.random()-0.5)*t.crownR, y:t.y-t.trunkH,
      vx:(Math.random()-0.5)*1.8, vy:0.25+Math.random()*0.6,
      alpha:1, size:3+Math.random()*5,
      color:`hsl(${12+Math.random()*45},82%,48%)`,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.14, life:1
    });
  }
  ctx.restore();
}

function shadeColor(hex, amount) {
  // Simplifié — retourne hex avec modification lumineuse via filtre ctx
  return hex;
}

// ─── Fleur style anime ultra réaliste ───
function drawFlower(f) {
  if(f.h < f.maxH) f.h = Math.min(f.maxH, f.h + (2.2 - f.wilt*0.6));
  if(f.watered>0){ f.watered--; if(f.wilt>0) f.wilt=Math.max(0,f.wilt-0.012); }
  const sway = Math.sin(time*1.05+f.seed)*6*f.sc + wind*18*f.sc;
  const wiltAngle = f.wilt*0.55;
  const tx = f.x+sway, ty = f.y-f.h;

  // Ombre portée
  ctx.save();
  ctx.globalAlpha=0.08;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(f.x+3,f.y,10*f.sc,3.5*f.sc,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save();
  // Tige courbe naturelle
  ctx.beginPath();
  ctx.moveTo(f.x,f.y);
  ctx.quadraticCurveTo(f.x+sway*0.5+wind*5, f.y-f.h*0.5, tx, ty);
  const stemG = ctx.createLinearGradient(f.x,f.y,tx,ty);
  stemG.addColorStop(0,f.pal.stem);
  stemG.addColorStop(0.5,lighten(f.pal.stem,20));
  stemG.addColorStop(1,lighten(f.pal.stem,10));
  ctx.strokeStyle=stemG;
  ctx.lineWidth = 3.5*f.sc*(1-f.wilt*0.28);
  ctx.lineCap='round'; ctx.stroke();

  // Feuilles composées style anime
  [0.3,0.58,0.78].forEach((t2,i)=>{
    if(i===2 && f.sc<0.5) return;
    const lx = f.x+(tx-f.x)*t2+sway*t2*0.6;
    const ly = f.y-f.h*t2;
    const side = i%2===0?1:-1;
    const ang = side*(0.85+f.leafAngle)+wiltAngle*0.25;
    const ls = (12+Math.random()*0)*f.sc;
    ctx.save(); ctx.translate(lx,ly); ctx.rotate(ang);
    const lg=ctx.createLinearGradient(0,0,ls*1.2,0);
    lg.addColorStop(0,f.pal.leaf||f.pal.stem);
    lg.addColorStop(0.5,lighten(f.pal.leaf||f.pal.stem,22));
    lg.addColorStop(1,lighten(f.pal.leaf||f.pal.stem,8));
    ctx.fillStyle=lg;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.quadraticCurveTo(ls*0.5,-ls*0.42,ls*1.15,0);
    ctx.quadraticCurveTo(ls*0.5,ls*0.38,0,0);
    ctx.fill();
    // Nervure centrale
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=0.6*f.sc;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ls*1.1,0); ctx.stroke();
    ctx.restore();
  });

  // Tête florale
  ctx.save(); ctx.translate(tx,ty);
  ctx.rotate(time*0.28+f.seed+wiltAngle);

  if(f.type==='daisy') {
    // Pétales avec dégradé + reflet style anime
    for(let i=0;i<f.petals;i++){
      const ang=(Math.PI*2/f.petals)*i;
      ctx.save(); ctx.rotate(ang);
      // Ombre pétale
      ctx.globalAlpha=0.15;
      ctx.fillStyle='#333';
      ctx.beginPath(); ctx.ellipse(0,-f.size*1.05,f.size*0.3,f.size*0.88,0,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      // Pétale principal
      const pg=ctx.createLinearGradient(0,0,0,-f.size*1.95);
      pg.addColorStop(0,f.pal.main);
      pg.addColorStop(0.4,lighten(f.pal.main,18));
      pg.addColorStop(0.75,lighten(f.pal.main,30));
      pg.addColorStop(1,'rgba(255,255,255,0.5)');
      ctx.fillStyle=pg;
      ctx.beginPath();
      ctx.ellipse(0,-f.size*1.02,f.size*0.30,f.size*0.92,0,0,Math.PI*2);
      ctx.fill();
      // Nervure claire
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=0.8*f.sc;
      ctx.beginPath(); ctx.moveTo(0,-f.size*0.15); ctx.lineTo(0,-f.size*1.8); ctx.stroke();
      ctx.restore();
    }
    // Cœur sphérique style anime
    const cg=ctx.createRadialGradient(-f.size*0.18,-f.size*0.18,0,0,0,f.size*0.58);
    cg.addColorStop(0,'rgba(255,255,255,0.9)');
    cg.addColorStop(0.25,lighten(f.pal.center,25));
    cg.addColorStop(0.7,f.pal.center);
    cg.addColorStop(1,darken(f.pal.center,20));
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.arc(0,0,f.size*0.58,0,Math.PI*2); ctx.fill();
    // Points texturés
    ctx.fillStyle='rgba(0,0,0,0.1)';
    for(let i=0;i<12;i++){
      const a=Math.random()*Math.PI*2, r2=Math.random()*f.size*0.48;
      ctx.beginPath(); ctx.arc(Math.cos(a)*r2,Math.sin(a)*r2,0.7*f.sc,0,Math.PI*2); ctx.fill();
    }
    // Reflet brillant
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.ellipse(-f.size*0.18,-f.size*0.2,f.size*0.16,f.size*0.1,-0.5,0,Math.PI*2); ctx.fill();

  } else {
    // Tulipe style anime — pétales en coupe veloutés
    for(let i=0;i<f.petals;i++){
      const ang=(Math.PI*2/f.petals)*i;
      ctx.save(); ctx.rotate(ang);
      // Ombre interne
      ctx.globalAlpha=0.18;
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(-f.size*0.48,-f.size*0.58,-f.size*0.58,-f.size*1.18,0,-f.size*1.52);
      ctx.bezierCurveTo(f.size*0.58,-f.size*1.18,f.size*0.48,-f.size*0.58,0,0);
      ctx.fill();
      ctx.globalAlpha=1;
      const pg=ctx.createLinearGradient(-f.size*0.3,0,f.size*0.3,-f.size*1.5);
      pg.addColorStop(0,darken(f.pal.main,15));
      pg.addColorStop(0.3,f.pal.main);
      pg.addColorStop(0.7,lighten(f.pal.main,20));
      pg.addColorStop(1,lighten(f.pal.main,35));
      ctx.fillStyle=pg;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(-f.size*0.48,-f.size*0.58,-f.size*0.58,-f.size*1.18,0,-f.size*1.52);
      ctx.bezierCurveTo(f.size*0.58,-f.size*1.18,f.size*0.48,-f.size*0.58,0,0);
      ctx.fill();
      // Reflet sur pétale
      ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=1*f.sc;
      ctx.beginPath(); ctx.moveTo(-f.size*0.1,-f.size*0.3); ctx.quadraticCurveTo(-f.size*0.2,-f.size*0.9,-f.size*0.05,-f.size*1.4); ctx.stroke();
      ctx.restore();
    }
    // Pistil
    const cg=ctx.createRadialGradient(0,0,0,0,0,f.size*0.32);
    cg.addColorStop(0,'rgba(255,255,255,0.8)');
    cg.addColorStop(0.3,lighten(f.pal.center,20));
    cg.addColorStop(1,f.pal.center);
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.arc(0,0,f.size*0.32,0,Math.PI*2); ctx.fill();
    for(let i=0;i<6;i++){
      const a=(Math.PI*2/6)*i;
      ctx.fillStyle='rgba(255,255,255,0.65)';
      ctx.beginPath(); ctx.arc(Math.cos(a)*f.size*0.2,Math.sin(a)*f.size*0.2,1.3*f.sc,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
  ctx.restore();

  if(f.watered>20){
    for(let i=0;i<2;i++){
      if(Math.random()<0.28) waterDrops.push({
        x:tx+(Math.random()-0.5)*12*f.sc, y:ty,
        vy:0.5+Math.random()*1.3, alpha:0.85, r:1.8*f.sc
      });
    }
  }
}

function lighten(color, amount) { return color; }
function darken(color, amount) { return color; }

function createFlower(x,y) {
  const row=getRow(y);
  if(row<0||row>=ROWS) return;
  const sc=getScale(y);
  const cfg=SEASON_CFG[SEASONS[seasonIdx]];
  const pal=cfg.flowerPalettes[Math.floor(Math.random()*cfg.flowerPalettes.length)];
  flowers.push({
    x,y,row,sc,h:0,
    maxH:(60+Math.random()*50)*sc,
    pal, petals:5+Math.floor(Math.random()*5),
    size:(9+Math.random()*9)*sc,
    seed:Math.random()*100,
    wilt:0, watered:0,
    type:Math.random()>0.5?'daisy':'tulip',
    leafAngle:(Math.random()-0.5)*0.55
  });
  flowers.sort((a,b)=>a.y-b.y);
  for(let i=0;i<10;i++) particles.push({
    x,y,vx:(Math.random()-0.5)*3.5,vy:-(Math.random()*2.5),
    alpha:1,size:2+Math.random()*3.5,
    color:`hsl(25,${28+Math.random()*22}%,${18+Math.random()*18}%)`,
    rot:0,rotV:0,life:1
  });
}

function drawPlayer(sc) {
  const bounce=player.isMoving?Math.abs(Math.sin(time*11))*7*sc:0;
  ctx.save(); ctx.translate(player.x,player.y-bounce);
  ctx.scale(player.dir*sc,sc);
  ctx.fillStyle='rgba(0,0,0,0.16)';
  ctx.beginPath(); ctx.ellipse(0,5,20,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5d4e8c';
  ctx.beginPath(); ctx.roundRect(-18,-28,36,30,[2,2,14,14]); ctx.fill();
  ctx.fillStyle='#7c6aad';
  ctx.beginPath(); ctx.roundRect(-15,-30,30,28,[2,2,12,12]); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.roundRect(-3,-30,6,28,[1]); ctx.fill();
  ctx.fillStyle='#f5c9a0';
  ctx.beginPath(); ctx.roundRect(-5,-38,10,12,[3]); ctx.fill();
  ctx.fillStyle='#f5c9a0';
  ctx.beginPath(); ctx.ellipse(0,-54,18,20,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2c1a0e';
  ctx.beginPath(); ctx.ellipse(0,-68,20,14,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-18,-58,8,12,0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(18,-58,8,12,-0.4,0,Math.PI*2); ctx.fill();
  const eyeY=-55;
  [[-7,eyeY],[7,eyeY]].forEach(([ex,ey])=>{
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(ex,ey,4.5,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2c5f8a'; ctx.beginPath(); ctx.ellipse(ex,ey,3.5,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(ex,ey,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.beginPath(); ctx.arc(ex+1.5,ey-1.5,1.2,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=0.35; ctx.fillStyle='#ff9a9a';
  ctx.beginPath(); ctx.arc(-13,-52,4.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(13,-52,4.5,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(180,80,80,0.6)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(0,-46,3,0.2,Math.PI-0.2); ctx.stroke();
  const armSwing=player.isMoving?Math.sin(time*10)*0.3:0;
  ctx.fillStyle='#7c6aad';
  ctx.save(); ctx.translate(-15,-20); ctx.rotate(-0.3+armSwing);
  ctx.beginPath(); ctx.roundRect(-4,0,8,20,[3]); ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(15,-20); ctx.rotate(0.3-armSwing);
  ctx.beginPath(); ctx.roundRect(-4,0,8,20,[3]); ctx.fill();
  if(tool==='plant'){
    ctx.fillStyle='#8B4513'; ctx.beginPath(); ctx.roundRect(-1,14,3,18,[1]); ctx.fill();
    ctx.fillStyle='#2ecc71'; ctx.beginPath(); ctx.ellipse(0,14,5,7,0,0,Math.PI*2); ctx.fill();
  } else if(tool==='cut'){
    ctx.strokeStyle='#95a5a6'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-3,14); ctx.lineTo(3,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3,14); ctx.lineTo(-3,26); ctx.stroke();
  } else {
    ctx.fillStyle='#5dade2'; ctx.beginPath(); ctx.arc(0,24,5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore(); ctx.restore();
  player.trail.push({x:player.x,y:player.y,alpha:0.4});
  if(player.trail.length>8) player.trail.shift();
  player.trail.forEach((p,i)=>{
    ctx.globalAlpha=(i/player.trail.length)*p.alpha*0.5*(player.isMoving?1:0);
    ctx.fillStyle='rgba(180,150,255,0.6)';
    ctx.beginPath(); ctx.arc(p.x,p.y-5,(i/player.trail.length)*6,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawFireflies() {
  if(seasonIdx!==1&&seasonIdx!==0) return;
  fireflies.forEach(f=>{
    f.phase+=f.speed*0.04;
    f.x=f.ox+Math.cos(f.phase)*55;
    f.y=f.oy+Math.sin(f.phase*0.65)*32;
    const glow=Math.abs(Math.sin(f.phase*2));
    const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*7);
    g.addColorStop(0,`rgba(200,255,180,${glow*0.95})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(f.x,f.y,f.r*7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(240,255,220,${glow})`;
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
  });
}

function drawSnow() {
  snowflakes.forEach(s=>{
    s.phase+=0.018; s.x+=s.vx+Math.sin(s.phase)*0.45+wind*2.8; s.y+=s.vy;
    if(s.y>h) s.y=0; if(s.x>w) s.x=0; if(s.x<0) s.x=w;
    ctx.globalAlpha=s.alpha;
    ctx.fillStyle='#e8f4fd';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ─── SOL rendu anime — dégradé riche par rangée ───
function drawGroundRow(r2, cfg) {
  const rowY=getY(r2), nextY=r2<ROWS-1?getY(r2+1):h+2;
  const rowH=nextY-rowY;
  // Sol de base
  const gl=ctx.createLinearGradient(0,rowY,0,nextY);
  gl.addColorStop(0, cfg.groundRows[r2]||cfg.groundRows[ROWS-1]);
  gl.addColorStop(1, cfg.groundRows[Math.min(r2+1,ROWS-1)]);
  ctx.fillStyle=gl; ctx.fillRect(0,rowY,w,rowH+2);

  // Micro-variation de texture — bandes de couleur horizontales aléatoires (fixe par rangée)
  ctx.globalAlpha=0.06;
  for(let i=0;i<3;i++){
    const ty2=rowY+rowH*(0.2+i*0.25);
    ctx.fillStyle=i%2===0?'rgba(255,255,255,1)':'rgba(0,0,0,1)';
    ctx.fillRect(0,ty2,w,rowH*0.08);
  }
  ctx.globalAlpha=1;

  // Brume de profondeur
  if(r2<4){
    const fogA=(1-(r2/4))*0.38;
    ctx.fillStyle=cfg.fogColor+fogA+')';
    ctx.fillRect(0,rowY,w,rowH);
  }
}

// ─── Herbe anime dense ───
function drawGrassRow(r2) {
  blades.filter(b=>b.row===r2).forEach(b=>{
    const sway=Math.sin(time*1.7+b.offset)*7*b.sc+wind*20*b.sc;
    ctx.beginPath();
    ctx.moveTo(b.x,b.y);
    // Courbe de Bézier pour l'herbe
    const cpx=b.x+sway*0.5+b.curve*b.h;
    const cpy=b.y-b.h*0.55;
    ctx.quadraticCurveTo(cpx,cpy,b.x+sway,b.y-b.h);
    // Dégradé sur le brin
    const bg=ctx.createLinearGradient(b.x,b.y,b.x+sway,b.y-b.h);
    bg.addColorStop(0,b.color);
    bg.addColorStop(0.6,b.color);
    bg.addColorStop(1,b.colorTip);
    ctx.strokeStyle=bg;
    ctx.lineWidth=b.w;
    ctx.lineCap='round'; ctx.stroke();
  });
}

// ─── BOUCLE PRINCIPALE ───
function loop() {
  time+=0.016;
  wind=Math.sin(time*0.5)*0.55+Math.sin(time*1.15)*0.22;

  player.isMoving=false;
  if(keys['KeyZ']||keys['KeyW']||keys['ArrowUp']){player.vy-=player.speed*0.6;player.isMoving=true;}
  if(keys['KeyS']||keys['ArrowDown']){player.vy+=player.speed*0.6;player.isMoving=true;}
  if(keys['KeyQ']||keys['KeyA']||keys['ArrowLeft']){player.vx-=player.speed;player.dir=-1;player.isMoving=true;}
  if(keys['KeyD']||keys['ArrowRight']){player.vx+=player.speed;player.dir=1;player.isMoving=true;}
  player.vx*=player.friction; player.vy*=player.friction;
  player.x+=player.vx; player.y+=player.vy;
  player.x=Math.max(30,Math.min(w-30,player.x));
  player.y=Math.max(getHorizon()+20,Math.min(h-10,player.y));

  clouds.forEach(c=>{c.x+=c.speed*(1+wind*0.25); if(c.x>w+c.r*3) c.x=-c.r*3;});
  birds.forEach(b=>{
    b.wing+=0.14*b.wingDir; if(Math.abs(b.wing)>1) b.wingDir*=-1;
    b.x+=b.vx; b.vy=Math.sin(time*0.45+b.x*0.012)*0.22; b.y+=b.vy;
    if(b.x>w+20) b.x=-20;
    b.y=Math.max(h*0.025,Math.min(h*0.28,b.y));
  });
  particles=particles.filter(p=>{
    p.x+=p.vx+wind*1.4; p.y+=p.vy; p.alpha-=0.011; p.rot+=p.rotV; p.life-=0.011;
    return p.alpha>0;
  });
  waterDrops=waterDrops.filter(d=>{
    d.y+=d.vy; d.alpha-=0.028; return d.alpha>0;
  });

  const cfg=SEASON_CFG[SEASONS[seasonIdx]];

  // Ciel
  ctx.clearRect(0,0,w,h);
  drawSky(cfg);

  // Nuages
  clouds.forEach(c=>drawCloud(c));

  // Oiseaux
  birds.forEach(b=>{
    ctx.save(); ctx.translate(b.x,b.y); ctx.scale(b.scale,b.scale);
    ctx.strokeStyle='rgba(30,30,40,0.65)'; ctx.lineWidth=1.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.quadraticCurveTo(-6,-5*b.wing,0,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12,0); ctx.quadraticCurveTo(6,-5*b.wing,0,0); ctx.stroke();
    ctx.restore();
  });

  // Rangées de sol + herbe + arbres + fleurs
  const playerRow=getRow(player.y);
  for(let r2=0;r2<ROWS;r2++){
    drawGroundRow(r2,cfg);
    drawGrassRow(r2);
    trees.filter(t=>t.row===r2).forEach(t=>drawTree(t,cfg));
    flowers.filter(f=>f.row===r2).forEach(f=>{
      if(f.watered<=0&&Math.random()<0.00018) f.wilt=Math.min(1,f.wilt+0.01);
      drawFlower(f);
    });
    if(r2===playerRow) drawPlayer(getScale(player.y));
  }

  drawFireflies();
  if(seasonIdx===3) drawSnow();

  // Particules
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.alpha;
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.color;
    ctx.beginPath();
    if(seasonIdx===3) ctx.arc(0,0,p.size/2,0,Math.PI*2);
    else ctx.ellipse(0,0,p.size,p.size*0.5,0,0,Math.PI*2);
    ctx.fill(); ctx.restore();
  });

  waterDrops.forEach(d=>{
    ctx.globalAlpha=d.alpha;
    ctx.fillStyle='rgba(100,180,255,0.82)';
    ctx.beginPath(); ctx.ellipse(d.x,d.y,d.r,d.r*1.6,0,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  if(tool==='cut'&&mouse){
    ctx.font='26px serif'; ctx.fillText('✂️',mouse.x-10,mouse.y+10);
  }

  requestAnimationFrame(loop);
}

let mouse=null;
canvas.addEventListener('mousemove',e=>mouse={x:e.clientX,y:e.clientY});
canvas.addEventListener('mousedown',e=>{
  if(e.clientY<getHorizon()) return;
  if(tool==='plant') createFlower(e.clientX,e.clientY);
  else if(tool==='cut') flowers=flowers.filter(f=>Math.hypot(f.x-e.clientX,(f.y-f.h/2)-e.clientY)>38);
  else flowers.forEach(f=>{ if(Math.hypot(f.x-e.clientX,(f.y-f.h)-e.clientY)<65) f.watered=130; });
});

window.addEventListener('resize',()=>{init();if(seasonIdx===3)initSnow();});
init(); loop();
</script>
</body>
