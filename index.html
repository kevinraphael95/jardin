<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Immersive : Le Grand Jardin Réaliste</title>
    <style>
        /* --- Styles de Base & Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #050a05; /* Fond très sombre, évoquant la terre profonde */
            color: #e0f0e0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            font-family: 'Georgia', serif; /* Police plus organique */
        }
        
        #jardin-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            /* Gradient de ciel réaliste */
            background: linear-gradient(to bottom, #a7d8f5 0%, #daeecc 45%, #7e8c69 50%, #4a543a 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- Interface Utilisateur Élégante --- */
        .ui-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
            background: rgba(20, 30, 20, 0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .tool-group {
            display: flex;
            gap: 10px;
        }

        .btn-bio {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(120, 180, 120, 0.5);
            background: rgba(40, 60, 40, 0.8);
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #a0c0a0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .btn-bio:hover { 
            transform: translateY(-3px); 
            background: rgba(60, 90, 60, 1);
            border-color: #8fbc8f;
            color: #fff;
        }
        
        .btn-bio.active {
            background: #556b2f; /* DarkOliveGreen */
            border-color: #9acd32; /* YellowGreen */
            color: #fff;
            box-shadow: 0 0 20px rgba(154, 205, 50, 0.6);
        }

        /* --- Indicateur de Croissance --- */
        .growth-info {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            color: #9acd32;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 16px;
            border: 1px solid rgba(154, 205, 50, 0.3);
            pointer-events: none;
            z-index: 100;
        }

        /* --- Curseur Personnalisé (Optionnel) --- */
        #jardin-container.plant-mode { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%239acd32" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>'), auto; }
        #jardin-container.cut-mode { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%23ff6b6b" d="M19 3L13 9l-3-3L3 13l3 3 3-3 3 3 6-6 3 3V3h-6z"/></svg>'), auto; }

    </style>
</head>
<body>

<div id="jardin-container" class="plant-mode">
    <canvas id="jardin-canvas"></canvas>
    
    <div class="ui-panel">
        <div class="tool-group">
            <div class="btn-bio active" id="btn-semer" title="Semer des fleurs" onclick="selectTool('semer')">🌱</div>
            <div class="btn-bio" id="btn-tailler" title="Tailler la végétation" onclick="selectTool('tailler')">🌿</div>
        </div>
        <div style="font-size: 14px; color: #a0c0a0; text-align: center;">Grand Jardin v2.0<br>Ultra-Réaliste</div>
    </div>

    <div class="growth-info">
        Total Fleurs : <span id="flower-count">0</span> | Vitesse Croissance : Réelle
    </div>
</div>

<script>
    const canvas = document.getElementById('jardin-canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('jardin-container');
    
    let w, h;
    let flora = [];

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }

    function plantSeed(x, y) {
        if (y < h * 0.48) return; // Empêche de planter dans le ciel
        flora.push({
            x, y,
            stemH: 0,
            targetH: 50 + Math.random() * 50,
            petals: 0,
            targetPetals: 10,
            growth: 0 // 0 à 1 (croissance complète)
        });
        document.getElementById('flower-count').innerText = flora.length;
    }

    function loop() {
        ctx.clearRect(0, 0, w, h);
        
        // Dessin du sol
        ctx.fillStyle = '#4a543a';
        ctx.fillRect(0, h * 0.48, w, h);

        flora.forEach((f, index) => {
            // Augmente la valeur de croissance à chaque frame (vitesse réglable)
            if (f.growth < 1) f.growth += 0.01; 

            const currentH = f.targetH * f.growth;
            const currentPetals = f.targetPetals * f.growth;

            // Dessin tige
            ctx.strokeStyle = '#3e5622';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(f.x, f.y);
            ctx.lineTo(f.x, f.y - currentH);
            ctx.stroke();

            // Dessin pétales (seulement si la tige a bien poussé)
            if (f.growth > 0.5) {
                ctx.fillStyle = '#d32f2f';
                ctx.beginPath();
                ctx.arc(f.x, f.y - currentH, currentPetals * 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        });
        requestAnimationFrame(loop);
    }

    canvas.addEventListener('mousedown', (e) => plantSeed(e.clientX, e.clientY));
    window.addEventListener('resize', init);
    init();
    loop();
</script>

</body>
</html>
